<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Tareas</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
        }

        .contenedor {
            text-align: center;
            background: rgba(255,255,255,0.08);
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
        }

        h1 {
            margin-bottom: 30px;
            font-size: 2.5rem;
        }

        a {
            display: inline-block;
            padding: 15px 30px;
            background: #38bdf8;
            color: white;
            text-decoration: none;
            font-size: 1.2rem;
            border-radius: 10px;
            transition: 0.3s;
        }

        a:hover {
            background: #0ea5e9;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <h1>Mis Tareas de Diseño Web</h1>
        <a href="tarea1/index.html">Tarea 1</a>
    </div>
</html>
